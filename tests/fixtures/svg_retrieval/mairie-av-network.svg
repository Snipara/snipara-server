<svg viewBox="0 0 1200 800" width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <title>Salle du conseil municipal - reseau AV</title>
  <desc>Topologie audiovisuelle reutilisable: switch coeur PoE, VLAN Dante separe du controle, DSP, matrice HDMI, captation Teams et nommage par zone.</desc>

  <g id="zone-regie" data-zone="regie">
    <text x="80" y="80">REGIE - Switch coeur PoE</text>
  </g>
  <g id="vlan-dante" data-vlan="Dante" data-pattern="reusable">
    <text x="80" y="150">VLAN Dante audio</text>
  </g>
  <g id="vlan-control" data-vlan="Control">
    <text x="80" y="220">VLAN controle AV</text>
  </g>
  <g id="dsp" data-equipment="DSP">
    <text x="420" y="150">DSP salle conseil</text>
  </g>
  <g id="matrix" data-equipment="Matrice HDMI">
    <text x="420" y="220">Matrice HDMI 8x8</text>
  </g>
  <g id="teams" data-equipment="Captation Teams">
    <text x="760" y="150">Captation Teams</text>
  </g>

  <line id="link-switch-dsp" data-from="REGIE - Switch coeur PoE" data-to="DSP salle conseil" x1="220" y1="145" x2="420" y2="145" stroke="#222" />
  <line id="link-switch-matrix" data-from="REGIE - Switch coeur PoE" data-to="Matrice HDMI 8x8" x1="220" y1="215" x2="420" y2="215" stroke="#222" />
</svg>
